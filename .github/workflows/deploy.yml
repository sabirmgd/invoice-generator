name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: deleg8-dev
  GCP_REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/deleg8-dev/delegate

jobs:
  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test -- --runInBand --passWithNoTests

  ci-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy-backend:
    needs: ci-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/invoice-generator:$SHA_TAG" \
                        -t "$REGISTRY/invoice-generator:latest" \
                        backend/
          docker push "$REGISTRY/invoice-generator:$SHA_TAG"
          docker push "$REGISTRY/invoice-generator:latest"

      - name: Deploy backend to Cloud Run
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          gcloud run services update invoice-generator \
            --region "$GCP_REGION" \
            --image "$REGISTRY/invoice-generator:$SHA_TAG"

  deploy-frontend:
    needs: ci-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push frontend image
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.BACKEND_URL }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL" \
                        -t "$REGISTRY/invoice-generator-frontend:$SHA_TAG" \
                        -t "$REGISTRY/invoice-generator-frontend:latest" \
                        frontend/
          docker push "$REGISTRY/invoice-generator-frontend:$SHA_TAG"
          docker push "$REGISTRY/invoice-generator-frontend:latest"

      - name: Deploy frontend to Cloud Run
        env:
          SHA_TAG: ${{ github.sha }}
        run: |
          gcloud run services update invoice-generator-frontend \
            --region "$GCP_REGION" \
            --image "$REGISTRY/invoice-generator-frontend:$SHA_TAG"
